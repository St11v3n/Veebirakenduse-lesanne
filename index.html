<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./decoration.css">
    <script src="interaction.js" defer></script>
</head>
<body>
    <h1>Interactive webpage</h1>
    <h3>
      Welcome, here you can play with some interactive functions.
    </h3>

    <h2>Text confirmation</h2>

    <input type="text" id="userInput" placeholder="Write whatever you want..." />
    <button id="presentBtn">Present</button>

    <p id="output"></p>

    <h2>Calculator</h2>

    <input id="num1" type="number" placeholder="First number" />
    <input id="num2" type="number" placeholder="Second number" />

    <br><br>

    <button id="add">a + b</button>
    <button id="sub">a - b</button>
    <button id="mul">a * b</button>
    <button id="div">a / b</button>

    <p id="result">Calculation: </p>

    <h2>To Do List</h2>

  <input id="taskInput" type="text" placeholder="Enter a task" />
  <button id="includeBtn">Include</button>

  <ul id="taskList"></ul>
</body>
</html>
